name: Python CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.11
      uses: actions/setup-python@v3
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install matplotlib
    - name: Run logic verification 1
      run: |
        cd dynamic_interval_management
        python dev/solution.py
    - name: Run logic verification 2
      run: |
        cd suffix_pattern_recognition
        python dev/solution.py
    - name: Upload Performance Graph
      uses: actions/upload-artifact@v4
      with:
        name: performance-report
        path: dynamic_interval_management/streaming_performance.png
